<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Clicker</title>

<style>
body {
    margin: 0;
    background: white; /* fondo blanco */
    color: black;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.menu {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 25px;
}

h1 {
    font-size: 80px;
}

/* BOTONES */
button {
    font-size: 28px;
    padding: 10px 20px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    transition: 0.2s;
}

/* Play */
.play {
    background: limegreen;
    color: black;
}

/* Achievements */
.achievements {
    background: #fdeca6;
    color: black;
}

/* Hover */
button:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<div class="menu">
    <h1>Event Clicker</h1>

    <button class="play" onclick="startGame()">Play</button>

    <button class="achievements" onclick="openAchievements()">
        Achievements
    </button>
</div>

<script>
function startGame() {
    window.location.href = "game.html";
}

function openAchievements() {
    alert("Achievements coming soon...");
}
</script>

</body>
</html>
