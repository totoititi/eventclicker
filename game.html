<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Clicker</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f0f0f0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

#money{
font-size:30px;
margin-bottom:20px;
}

#buttons{
display:flex;
flex-direction:column;
gap:40px;
}

button{
background:white;
border:2px solid black;
font-size:26px;
padding:12px 35px;
cursor:pointer;
}

/* botón deshabilitado */

button:disabled{
background:#cfcfcf;
color:#666;
border:2px solid #888;
cursor:not-allowed;
}

/* texto flotante */

.floating{
position:absolute;
color:green;
font-size:16px;
animation:floatUp 1s forwards;
pointer-events:none;
}

@keyframes floatUp{
0%{opacity:1; transform:translateY(0);}
100%{opacity:0; transform:translateY(-50px);}
}

/* shop */

#shop{
position:fixed;
right:20px;
top:20px;
background:white;
border:2px solid black;
padding:15px;
width:260px;
display:none;
}

.shopItem{
margin-bottom:12px;
border-bottom:1px solid #ddd;
padding-bottom:8px;
}

.buyBtn{
margin-top:5px;
font-size:16px;
padding:5px 10px;
}

</style>
</head>

<body>

<div id="money">$0</div>

<div id="buttons">

<button id="clickBtn" onclick="clickGame(event)">Click</button>

<button onclick="toggleShop()">Shop</button>

</div>

<div id="shop">

<h3>Shop</h3>

<div class="shopItem">
<b>Clicker</b><br>
1 click every 0.5 seconds<br>
$100<br>
<button id="buyClicker" class="buyBtn" onclick="buy('clicker')">Buy</button>
</div>

<div class="shopItem">
<b>Staff</b><br>
2 clicks every 0.5 seconds<br>
$750<br>
<button id="buyStaff" class="buyBtn" onclick="buy('staff')">Buy</button>
</div>

<div class="shopItem">
<b>Joker 🃏</b><br>
Undo any chosen effect<br>
$1000 (max 3)<br>
<button id="buyJoker" class="buyBtn" onclick="buy('joker')">Buy</button>
</div>

</div>

<script>

let money=0
let jokers=0

let hasClicker=false
let hasStaff=false

function clickGame(event){

money+=1
updateMoney()

spawnText("+1$", event.clientX, event.clientY)

}

function spawnText(text,x,y){

const t=document.createElement("div")

t.className="floating"
t.innerText=text

t.style.left=x+"px"
t.style.top=y+"px"

document.body.appendChild(t)

setTimeout(()=>{t.remove()},1000)

}

function updateMoney(){
document.getElementById("money").innerText="$"+money
}

function toggleShop(){

const s=document.getElementById("shop")

s.style.display=(s.style.display=="none")?"block":"none"

}

function buy(item){

if(item=="clicker"){

if(hasClicker)return

if(money>=100){

money-=100
hasClicker=true
updateMoney()

document.getElementById("buyClicker").disabled=true

setInterval(()=>{

money+=1
updateMoney()

const btn=document.getElementById("clickBtn")
const rect=btn.getBoundingClientRect()

spawnText("+1$",rect.left+rect.width/2,rect.top)

},500)

}

}

if(item=="staff"){

if(hasStaff)return

if(money>=750){

money-=750
hasStaff=true
updateMoney()

document.getElementById("buyStaff").disabled=true

setInterval(()=>{

money+=2
updateMoney()

const btn=document.getElementById("clickBtn")
const rect=btn.getBoundingClientRect()

spawnText("+2$",rect.left+rect.width/2,rect.top)

},500)

}

}

if(item=="joker"){

if(jokers>=3)return

if(money>=1000){

money-=1000
jokers++
updateMoney()

if(jokers>=3){
document.getElementById("buyJoker").disabled=true
}

}

}

}

/* advertencia al salir */

window.onbeforeunload=function(){
return "Are you sure? Your progress may be lost.";
}

</script>

</body>
</html>
